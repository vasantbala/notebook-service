services:
  notebook-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://notebook:notebook@postgres:5432/notebook?sslmode=disable
      REDIS_URL: redis:6379
      JWKS_ENDPOINT: ${JWKS_ENDPOINT}
      RAG_ANYTHING_BASE_URL: ${RAG_ANYTHING_BASE_URL:-http://rag-anything:8000}
      LLM_PROVIDER: openai
      OPENAI__BASEURL: ${OPENAI__BASEURL:-https://api.openai.com/v1}
      OPENAI__APIKEY: ${OPENAI__APIKEY}
      OPENAI__MODEL: ${OPENAI__MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notebook
      POSTGRES_PASSWORD: notebook
      POSTGRES_DB: notebook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebook"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
